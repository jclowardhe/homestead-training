<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homestead Electric — Training Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060c;
    --bg-2: #070b14;
    --panel: rgba(10,18,30,0.72);
    --panel-solid: #0a1220;
    --cyan: #1ce6ff;
    --cyan-dim: #0c8a9c;
    --cyan-soft: #8ff3ff;
    --amber: #ffae28;
    --amber-soft: #ffd27a;
    --magenta: #ff3da6;
    --green: #4dffb0;
    --grid: rgba(28,230,255,0.055);
    --line: rgba(28,230,255,0.22);
    --line-soft: rgba(28,230,255,0.12);
    --text: #cdeaf3;
    --muted: #5f8593;
    --glow-cyan: 0 0 8px rgba(28,230,255,0.55), 0 0 22px rgba(28,230,255,0.28);
    --glow-amber: 0 0 8px rgba(255,174,40,0.55), 0 0 22px rgba(255,174,40,0.3);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    min-height: 100vh;
  }
  body {
    position: relative;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 44px 44px;
    background-position: center top;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(28,230,255,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(255,174,40,0.06), transparent 60%),
      radial-gradient(circle at 50% 40%, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 0;
  }

  header.brand-bar {
    text-align: center;
    padding: 26px 20px 20px;
    position: relative;
    z-index: 2;
    border-bottom: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(28,230,255,0.35), 0 8px 30px -10px rgba(28,230,255,0.25);
    background: linear-gradient(180deg, rgba(7,11,20,0.9), rgba(7,11,20,0.3));
    backdrop-filter: blur(4px);
  }
  .brand-mark {
    display: inline-flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; text-decoration: none;
  }
  .brand-mark .bolt {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 6px rgba(28,230,255,0.8));
  }
  .brand-mark .bolt svg { width: 100%; height: 100%; }
  .brand-mark .brand-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900; font-size: 19px; letter-spacing: 5px;
    color: #eafcff;
    text-shadow: var(--glow-cyan);
  }
  .brand-mark .brand-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 6px; color: var(--cyan); opacity: 0.85;
  }

  .container {
    max-width: 880px; margin: 0 auto;
    padding: 38px 22px 90px;
    position: relative; z-index: 1;
  }

  .eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--cyan); font-weight: 600;
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    text-shadow: 0 0 10px rgba(28,230,255,0.4);
  }
  .eyebrow::before {
    content: ""; width: 26px; height: 1px;
    background: var(--cyan); box-shadow: var(--glow-cyan);
  }
  .eyebrow .sep { color: var(--cyan-dim); }
  .eyebrow .sub { color: var(--muted); font-weight: 500; }

  h1.display, .display-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 46px; line-height: 1.05; margin: 0 0 8px;
    color: #eafcff;
    text-shadow: 0 0 10px rgba(28,230,255,0.5), 0 0 30px rgba(28,230,255,0.25);
    letter-spacing: 1px;
  }
  .display-name { font-size: 40px; text-transform: uppercase; }
  h1.display .punct, .display-name .punct {
    color: var(--amber); text-shadow: var(--glow-amber);
  }
  .subhead {
    font-size: 16px; color: var(--muted); margin-bottom: 34px; max-width: 620px;
    font-weight: 500;
  }

  .stats-row {
    display: flex; gap: 14px; margin-bottom: 36px; flex-wrap: wrap;
  }
  .stat {
    flex: 1; min-width: 130px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 24px rgba(28,230,255,0.05);
  }
  .stat::after {
    content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--cyan); box-shadow: var(--glow-cyan);
  }
  .stat .stat-lbl {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; font-weight: 600;
  }
  .stat .stat-val {
    font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 700;
    color: var(--cyan-soft); line-height: 1; text-shadow: var(--glow-cyan);
  }
  .stat .stat-val.small { font-size: 17px; letter-spacing: 1px; }
  .stat .stat-val .frac { font-size: 15px; color: var(--muted); text-shadow: none; font-family: 'Rajdhani'; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line-soft); padding-bottom: 10px;
  }
  .section-head h2 {
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700;
    margin: 0; color: #eafcff; letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(28,230,255,0.35);
  }
  .section-head .meta {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan);
    font-weight: 600;
  }

  .item-list { list-style: none; margin: 0 0 26px; padding: 0; }
  .item {
    background: var(--panel);
    border: 1px solid var(--line);
    margin-bottom: 12px; padding: 18px 22px;
    display: flex; align-items: center; gap: 20px; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.14s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
  }
  .item::before {
    content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--cyan); box-shadow: var(--glow-cyan);
  }
  .item:hover {
    transform: translateX(4px);
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(28,230,255,0.4), 0 0 26px -4px rgba(28,230,255,0.5), inset 0 0 30px rgba(28,230,255,0.07);
    background: rgba(12,24,38,0.9);
  }
  .item .num {
    font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
    color: var(--cyan); min-width: 44px; flex-shrink: 0;
    text-shadow: var(--glow-cyan);
  }
  .item .body { flex: 1; min-width: 0; }
  .item .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: #eafcff; margin-bottom: 4px;
  }
  .item .sub { font-size: 14px; color: var(--muted); font-weight: 500; }
  .item .rank-progress {
    font-size: 11px; letter-spacing: 2px; color: var(--cyan); margin-top: 6px;
    text-transform: uppercase; font-weight: 600;
  }
  .item .progress-line {
    height: 5px; background: rgba(28,230,255,0.1); margin-top: 6px; width: 100%;
    overflow: hidden; border: 1px solid var(--line-soft);
  }
  .item .progress-line .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    box-shadow: 0 0 12px rgba(28,230,255,0.7);
    transition: width 0.5s ease;
  }
  .item .arrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; color: var(--cyan); flex-shrink: 0; transition: transform 0.15s ease;
    text-shadow: var(--glow-cyan);
  }
  .item:hover .arrow { transform: translateX(5px); }
  .item.complete-rank::before { background: var(--green); box-shadow: 0 0 8px rgba(77,255,176,0.7), 0 0 22px rgba(77,255,176,0.4); }
  .item.complete-rank .num { color: var(--green); text-shadow: 0 0 8px rgba(77,255,176,0.7); }

  .badge-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .badge-tile {
    background: var(--panel);
    border: 1px solid var(--line-soft);
    padding: 22px 16px 18px; text-align: center; cursor: pointer;
    position: relative; transition: transform 0.16s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    display: flex; flex-direction: column; align-items: center;
  }
  .badge-tile:hover {
    transform: translateY(-4px);
    border-color: var(--cyan);
    box-shadow: 0 0 26px -6px rgba(28,230,255,0.55), inset 0 0 30px rgba(28,230,255,0.06);
  }
  .emblem {
    width: 78px; height: 78px; margin-bottom: 14px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .emblem .hex-border {
    position: absolute; inset: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--line);
  }
  .emblem .hex-inner {
    position: absolute; inset: 2px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--panel-solid);
    display: flex; align-items: center; justify-content: center;
  }
  .emblem .em-num {
    position: relative; z-index: 2;
    font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
    color: var(--muted);
  }
  .badge-tile .badge-name {
    font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase; color: var(--text);
    line-height: 1.25; margin-bottom: 8px; min-height: 30px;
    display: flex; align-items: center;
  }
  .badge-tile .badge-status {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin-top: auto;
  }
  .badge-tile.earned {
    border-color: var(--cyan);
    box-shadow: 0 0 22px -8px rgba(28,230,255,0.5), inset 0 0 26px rgba(28,230,255,0.08);
  }
  .badge-tile.earned .hex-border { background: var(--cyan); box-shadow: 0 0 14px rgba(28,230,255,0.6); }
  .badge-tile.earned .hex-inner { background: radial-gradient(circle, rgba(28,230,255,0.22), rgba(10,18,32,0.95)); }
  .badge-tile.earned .em-num { color: var(--cyan-soft); text-shadow: var(--glow-cyan); }
  .badge-tile.earned .badge-status { color: var(--cyan); }
  .badge-tile.earned .emblem::after {
    content: "✓"; position: absolute; bottom: -2px; right: -2px; z-index: 3;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--cyan); color: #04060c; font-weight: 900; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 12px rgba(28,230,255,0.8); font-family: 'Rajdhani';
  }
  .badge-tile.earned .badge-name { color: #eafcff; }

  .status-bar {
    border: 1px solid var(--line-soft); padding: 11px 16px;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    background: var(--panel); font-weight: 600;
  }
  .status-bar .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px rgba(77,255,176,0.9); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .footer-links { text-align: center; margin-top: 16px; font-size: 13px; }
  .footer-links a {
    color: var(--muted); text-decoration: none; margin: 0 14px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; font-size: 12px; font-weight: 600;
  }
  .footer-links a:hover { color: var(--cyan); text-shadow: 0 0 10px rgba(28,230,255,0.5); }

  .back-link {
    display: inline-flex; align-items: center; gap: 8px; color: var(--cyan);
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    background: none; border: none; padding: 0; font-family: 'Rajdhani'; font-weight: 600;
    margin-bottom: 24px;
  }
  .back-link:hover { text-shadow: var(--glow-cyan); }
  .back-link::before { content: "◄"; font-size: 10px; }

  .rank-hero { padding-bottom: 22px; border-bottom: 1px solid var(--line-soft); margin-bottom: 30px; }

  .setup-wrap { padding-top: 26px; }
  .setup-form {
    background: var(--panel); border: 1px solid var(--line); padding: 34px 38px;
    box-shadow: inset 0 0 40px rgba(28,230,255,0.05);
  }
  label {
    display: block; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 7px; margin-top: 18px; font-weight: 600;
  }
  .setup-form label:first-child { margin-top: 0; }
  input[type="text"], input[type="date"], input[type="email"], input[type="password"], textarea, select {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 0;
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 500;
    background: rgba(4,8,14,0.7); color: var(--text);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(28,230,255,0.4), 0 0 18px -4px rgba(28,230,255,0.6);
  }
  textarea { resize: vertical; min-height: 84px; font-family: 'Rajdhani', sans-serif; }
  select option { background: var(--panel-solid); }

  button {
    cursor: pointer; font-family: 'Orbitron', sans-serif; border-radius: 0;
    border: 1px solid var(--cyan); padding: 11px 22px;
    font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(28,230,255,0.08); color: var(--cyan);
    transition: all 0.16s ease;
  }
  button:hover {
    background: var(--cyan); color: #04060c;
    box-shadow: 0 0 18px -2px rgba(28,230,255,0.7);
  }
  button.primary {
    background: var(--cyan); color: #04060c; box-shadow: var(--glow-cyan);
  }
  button.primary:hover { background: var(--amber); border-color: var(--amber); box-shadow: var(--glow-amber); }
  button.ghost { border-color: var(--line); color: var(--muted); background: transparent; }
  button.ghost:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(28,230,255,0.06); box-shadow: none; }
  button.danger { border-color: var(--magenta); color: var(--magenta); background: rgba(255,61,166,0.08); }
  button.danger:hover { background: var(--magenta); color: #04060c; box-shadow: 0 0 18px -2px rgba(255,61,166,0.7); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .toolbar { display: flex; gap: 7px; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 22px; align-items: center; }
  .toolbar .who { margin-right: auto; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
  .toolbar button { padding: 7px 13px; font-size: 9px; letter-spacing: 1.5px; }
  .edit-banner {
    background: rgba(255,174,40,0.1); border: 1px solid var(--amber); color: var(--amber-soft);
    padding: 10px 16px; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    text-align: center; margin-bottom: 20px; font-weight: 600; font-family: 'Rajdhani';
    text-shadow: 0 0 10px rgba(255,174,40,0.4);
  }

  .role-tag {
    display: inline-block; font-family: 'Orbitron', sans-serif; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px;
    border: 1px solid var(--line); color: var(--cyan); margin-left: 6px;
  }
  .role-tag.foreman { color: var(--amber); border-color: rgba(255,174,40,0.5); }
  .avatar {
    width: 50px; height: 50px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px; color: #04060c;
    background: linear-gradient(135deg, var(--cyan), var(--amber));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .auth-error { color: var(--magenta); font-size: 14px; margin-top: 14px; font-weight: 600; letter-spacing: 0.4px; min-height: 18px; }
  .auth-toggle { margin-top: 20px; font-size: 14px; color: var(--muted); font-weight: 500; }
  .auth-toggle a { color: var(--cyan); cursor: pointer; font-weight: 700; }
  .auth-toggle a:hover { text-shadow: var(--glow-cyan); }
  .loading-wrap { text-align: center; padding-top: 90px; color: var(--muted); }
  .loading-wrap .spin {
    width: 46px; height: 46px; margin: 0 auto 18px; border: 3px solid var(--line);
    border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.9s linear infinite;
    box-shadow: var(--glow-cyan);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap .msg { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; color: var(--cyan); }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(2,4,8,0.82);
    display: none; align-items: flex-start; justify-content: center;
    padding: 56px 20px 40px; z-index: 100; overflow-y: auto;
    backdrop-filter: blur(3px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-2); max-width: 600px; width: 100%;
    border: 1px solid var(--cyan); position: relative;
    box-shadow: 0 0 0 1px rgba(28,230,255,0.3), 0 0 60px -10px rgba(28,230,255,0.5);
  }
  .modal-head { padding: 28px 36px 22px; border-bottom: 1px solid var(--line-soft); }
  .modal-head .eyebrow { margin-bottom: 12px; }
  .modal-head h3 {
    font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 700;
    line-height: 1.15; margin: 0; color: #eafcff; letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(28,230,255,0.4);
  }
  .modal-head .desc { color: var(--muted); font-size: 15px; margin-top: 10px; font-weight: 500; }
  .modal-body { padding: 24px 36px; }
  .modal-foot {
    padding: 18px 36px; border-top: 1px solid var(--line-soft);
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    background: rgba(4,8,14,0.6);
  }
  .modal-foot .right { display: flex; gap: 8px; }
  .modal-close {
    position: absolute; top: 14px; right: 16px; background: transparent; border: none;
    color: var(--muted); font-size: 26px; line-height: 1; padding: 4px 8px; cursor: pointer;
    letter-spacing: 0; font-family: 'Rajdhani';
  }
  .modal-close:hover { color: var(--cyan); background: transparent; box-shadow: none; }

  .req-section { margin-bottom: 22px; }
  .req-section h4 {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--cyan);
    margin: 0 0 12px; font-weight: 600; display: flex; align-items: center; gap: 10px;
  }
  .req-section h4::before { content: ""; width: 18px; height: 1px; background: var(--cyan); box-shadow: var(--glow-cyan); }
  .req-list { list-style: none; padding: 0; margin: 0; counter-reset: req; }
  .req-list li {
    padding: 12px 0 12px 40px; border-top: 1px solid var(--line-soft);
    font-size: 15px; color: var(--text); position: relative; counter-increment: req;
    font-weight: 500;
  }
  .req-list li:last-child { border-bottom: 1px solid var(--line-soft); }
  .req-list li::before {
    content: counter(req, decimal-leading-zero); position: absolute; left: 0; top: 12px;
    font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--amber);
    font-weight: 700; text-shadow: 0 0 8px rgba(255,174,40,0.5);
  }

  .signoff-card {
    background: rgba(28,230,255,0.06); border: 1px solid var(--cyan);
    border-left: 4px solid var(--cyan); padding: 18px 22px; margin-top: 10px;
    box-shadow: inset 0 0 24px rgba(28,230,255,0.08);
  }
  .signoff-card .lbl { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--cyan); margin-bottom: 8px; font-weight: 600; }
  .signoff-card .who { font-family: 'Orbitron', sans-serif; font-size: 19px; font-weight: 700; color: #eafcff; margin-bottom: 4px; text-shadow: 0 0 10px rgba(28,230,255,0.4); }
  .signoff-card .when { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; font-weight: 600; }
  .signoff-card .notes { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); font-size: 14px; color: var(--text); font-style: italic; }

  .signoff-form { background: rgba(4,8,14,0.6); padding: 22px 24px; border: 1px solid var(--line); }
  .signoff-form .form-eyebrow { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); font-weight: 600; margin-bottom: 14px; text-shadow: 0 0 10px rgba(255,174,40,0.4); }
  .signoff-form label { margin-top: 14px; }
  .signoff-form label:first-of-type { margin-top: 0; }
  .locked-note { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 14px; }

  /* Emblem icons */
  .emblem .em-icon { position: relative; z-index: 2; width: 40px; height: 40px; color: var(--muted); transition: color .2s, filter .2s; }
  .emblem .em-chip {
    position: absolute; top: -6px; left: -6px; z-index: 4;
    font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
    color: var(--muted); background: var(--bg-2); border: 1px solid var(--line-soft);
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .badge-tile.earned .em-icon { color: var(--cyan-soft); filter: drop-shadow(0 0 8px rgba(28,230,255,0.8)); }
  .badge-tile.earned .em-chip { color: var(--cyan); border-color: var(--cyan); }
  .badge-tile:hover .em-icon { color: var(--cyan); filter: drop-shadow(0 0 6px rgba(28,230,255,0.6)); }

  /* Entrance + background motion */
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .rise { animation: rise .5s cubic-bezier(.2,.7,.2,1) backwards; }
  @keyframes griddrift { from { background-position: center 0; } to { background-position: center 44px; } }
  body { animation: griddrift 7s linear infinite; }
  body::after {
    content: ""; position: fixed; left: 0; right: 0; height: 200px; top: -200px;
    background: linear-gradient(180deg, transparent, rgba(28,230,255,0.055), transparent);
    pointer-events: none; z-index: 0; animation: scan 8s linear infinite;
  }
  @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(150vh); } }

  /* ===== Big celebration ===== */
  .celebration {
    position: fixed; inset: 0; z-index: 300; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 44%, rgba(28,230,255,0.18), rgba(2,4,8,0) 55%);
    animation: celIn .25s ease, celOut .7s ease 4.3s forwards;
  }
  @keyframes celIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes celOut { to { opacity: 0; } }
  .celebration .flash { position: absolute; inset: 0; background: rgba(143,243,255,0.55); animation: flash .45s ease forwards; }
  @keyframes flash { 0% { opacity: 0; } 10% { opacity: 0.85; } 100% { opacity: 0; } }
  .spark-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cel-rings { position: absolute; top: 41%; left: 50%; }
  .cel-rings span {
    position: absolute; top: 0; left: 0; width: 130px; height: 130px; margin: -65px 0 0 -65px;
    border: 2px solid var(--cyan); border-radius: 50%; opacity: 0; animation: ring 1.5s ease-out forwards;
  }
  .cel-rings span:nth-child(2) { animation-delay: .15s; border-color: var(--amber); }
  .cel-rings span:nth-child(3) { animation-delay: .3s; }
  @keyframes ring { 0% { transform: scale(0.2); opacity: 0.9; } 100% { transform: scale(3.6); opacity: 0; } }
  .cel-badge {
    position: relative; width: 150px; height: 150px; margin-bottom: 26px;
    animation: badgeIn 1s cubic-bezier(.18,.9,.24,1.1) forwards; transform: scale(0) rotate(-40deg);
  }
  @keyframes badgeIn { 0% { transform: scale(0) rotate(-40deg); } 62% { transform: scale(1.14) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
  .cel-badge .cel-hex-border {
    position: absolute; inset: 0; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--cyan); box-shadow: 0 0 44px rgba(28,230,255,0.9); animation: hexpulse 1.2s ease-in-out infinite;
  }
  @keyframes hexpulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.45); } }
  .cel-badge .cel-hex-inner {
    position: absolute; inset: 4px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: radial-gradient(circle, #06303a, #04060c); display: flex; align-items: center; justify-content: center;
  }
  .cel-badge .em-icon { width: 64px; height: 64px; color: #eafcff; filter: drop-shadow(0 0 14px rgba(28,230,255,0.95)); }
  .cel-text { text-align: center; position: relative; z-index: 5; animation: rise .6s ease .35s backwards; }
  .cel-text .cel-eyebrow { font-family: 'Orbitron'; font-size: 13px; letter-spacing: 6px; color: var(--cyan); text-shadow: var(--glow-cyan); margin-bottom: 12px; }
  .cel-text .cel-name { font-family: 'Orbitron'; font-size: 34px; font-weight: 900; color: #eafcff; text-shadow: 0 0 20px rgba(28,230,255,0.85); letter-spacing: 1px; }
  .cel-text .cel-by { font-size: 15px; color: var(--muted); margin-top: 10px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
  @media (max-width: 640px) { .cel-text .cel-name { font-size: 24px; } .cel-badge { width: 120px; height: 120px; } }

  /* ===== Homestead longhorn branding ===== */
  .brand-logo { height: 74px; width: auto; display: block; filter: drop-shadow(0 0 8px rgba(28,230,255,0.75)); }
  .brand-mark .brand-sub { margin-top: 5px; }
  .logo-watermark {
    position: fixed; inset: 0; background-repeat: no-repeat;
    background-position: center 56%; background-size: 560px;
    opacity: 0.05; pointer-events: none; z-index: 0;
  }
  .auth-logo {
    display: block; width: 360px; max-width: 80%; margin: 0 0 24px;
    filter: drop-shadow(0 0 16px rgba(28,230,255,0.55));
    animation: rise .6s ease backwards;
  }
  .smoke-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }
  .cel-longhorn-wrap {
    position: relative; z-index: 1; margin-bottom: 22px;
    transform: scale(0); animation: lhIn .8s cubic-bezier(.18,.9,.24,1.1) forwards;
  }
  .cel-longhorn {
    width: 400px; max-width: 78vw; display: block;
    filter: drop-shadow(0 0 22px rgba(28,230,255,0.8));
    animation: lhSnort .55s ease .72s;
  }
  @keyframes lhIn { 0%{transform:scale(0) rotate(-8deg);} 60%{transform:scale(1.07) rotate(2deg);} 100%{transform:scale(1) rotate(0);} }
  @keyframes lhSnort { 0%,100%{transform:translateY(0);} 35%{transform:translateY(6px);} 70%{transform:translateY(-2px);} }
  @media (max-width: 640px){ .cel-longhorn{ width: 270px; } .auth-logo{ width: 260px; } .brand-logo{ height: 54px; } }

  .add-row {
    border: 1px dashed var(--line); padding: 14px; text-align: center; color: var(--muted);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    background: transparent; width: 100%; margin-top: 8px; font-weight: 600; font-family: 'Orbitron';
  }
  .add-row:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(28,230,255,0.05); box-shadow: 0 0 18px -6px rgba(28,230,255,0.5); }

  @media (max-width: 640px) {
    h1.display { font-size: 32px; }
    .display-name { font-size: 26px; }
    .container { padding: 26px 16px 60px; }
    .modal-head { padding: 22px 22px 18px; }
    .modal-body { padding: 18px 22px; }
    .modal-foot { padding: 14px 22px; }
    .modal-head h3 { font-size: 21px; }
    .setup-form { padding: 24px 20px; }
    .item { padding: 15px 16px; gap: 14px; }
    .item .num { font-size: 20px; min-width: 32px; }
    .badge-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  }
</style>
</head>

/* ---------- App state ---------- */
let me = null;          // firebase auth user
let profile = null;     // my users/{uid} doc
let curriculum = null;  // config/curriculum
let apprentices = [];   // foreman roster
let selectedAppId = null, selectedAppData = null; // foreman: viewing one apprentice
let view = { name: "home", rankId: null };
let editMode = false;
let authMode = "login";

let unsubProfile = null, unsubCurriculum = null, unsubRoster = null, unsubSelApp = null;
let curriculumSubbed = false, rosterSubbed = false;
let prevEarnedIds = null; // apprentice self celebration tracking

const C = () => document.getElementById("container");
function isForeman() { return profile && (profile.role === "foreman" || profile.role === "owner"); }
function isOwner() { return !!me && me.email && me.email.toLowerCase() === OWNER_EMAIL; }

/* ---------- Auth lifecycle ---------- */
auth.onAuthStateChanged((user) => {
  cleanup();
  me = user;
  if (!user) { profile = null; authMode = "login"; renderAuth(); return; }
  renderLoading("Connecting to the grid…");
  subscribeProfile(user.uid);
});

function cleanup() {
  if (unsubProfile) unsubProfile(); if (unsubCurriculum) unsubCurriculum();
  if (unsubRoster) unsubRoster(); if (unsubSelApp) unsubSelApp();
  unsubProfile = unsubCurriculum = unsubRoster = unsubSelApp = null;
  curriculumSubbed = rosterSubbed = false;
  profile = null; curriculum = null; apprentices = [];
  selectedAppId = null; selectedAppData = null; prevEarnedIds = null;
  view = { name: "home" }; editMode = false;
}

function subscribeProfile(uid) {
  unsubProfile = db.collection("users").doc(uid).onSnapshot((snap) => {
    if (!snap.exists) { renderLoading("Setting up your account…"); return; }
    profile = snap.data();
    if (profile.role === "apprentice") {
      const ids = Object.keys(profile.earnedBadges || {});
      if (prevEarnedIds !== null) {
        const fresh = ids.filter(x => !prevEarnedIds.includes(x));
        if (fresh.length) {
          const bid = fresh[fresh.length - 1];
          const b = findBadge(bid);
          const eb = (profile.earnedBadges || {})[bid];
          if (b) celebrate(b, eb && eb.trainer);
        }
      }
      prevEarnedIds = ids;
    }
    subscribeCurriculum();
    if (isForeman()) subscribeRoster();
    render();
  }, (err) => { renderError(err.message); });
}

function subscribeCurriculum() {
  if (curriculumSubbed) return; curriculumSubbed = true;
  unsubCurriculum = db.collection("config").doc("curriculum").onSnapshot((snap) => {
    if (snap.exists) { curriculum = snap.data(); }
    else {
      curriculum = null;
      if (isForeman()) {
        db.collection("config").doc("curriculum")
          .set(JSON.parse(JSON.stringify(DEFAULT_CURRICULUM)))
          .catch(e => renderError(e.message));
      }
    }
    render();
  }, (err) => { renderError(err.message); });
}

function subscribeRoster() {
  if (rosterSubbed) return; rosterSubbed = true;
  unsubRoster = db.collection("users").where("role", "==", "apprentice").onSnapshot((snap) => {
    apprentices = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
    apprentices.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    render();
  }, (err) => { renderError(err.message); });
}

function subscribeSelApp(uid) {
  if (unsubSelApp) unsubSelApp();
  unsubSelApp = db.collection("users").doc(uid).onSnapshot((snap) => {
    if (snap.exists) { selectedAppData = Object.assign({ id: snap.id }, snap.data()); render(); }
  });
}

/* ---------- Auth actions ---------- */
function doSignup(name, email, password, company, errEl) {
  auth.createUserWithEmailAndPassword(email.trim(), password)
    .then((cred) => {
      const role = (email.trim().toLowerCase() === OWNER_EMAIL) ? "owner" : "apprentice";
      return db.collection("users").doc(cred.user.uid).set({
        name: name.trim(), email: email.trim().toLowerCase(), role: role,
        company: (company || "Homestead Electric").trim(),
        startDate: new Date().toISOString().slice(0, 10),
        earnedBadges: {},
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    })
    .catch((e) => { if (errEl) errEl.textContent = friendlyAuthError(e); });
}
function doLogin(email, password, errEl) {
  auth.signInWithEmailAndPassword(email.trim(), password)
    .catch((e) => { if (errEl) errEl.textContent = friendlyAuthError(e); });
}
function doLogout() { auth.signOut(); }
function friendlyAuthError(e) {
  const m = (e && e.code) || "";
  if (m.includes("email-already-in-use")) return "That email already has an account — try logging in.";
  if (m.includes("invalid-credential") || m.includes("wrong-password") || m.includes("user-not-found")) return "Email or password is incorrect.";
  if (m.includes("weak-password")) return "Password must be at least 6 characters.";
  if (m.includes("invalid-email")) return "That doesn't look like a valid email.";
  return (e && e.message) || "Something went wrong.";
}

/* ---------- Render router ---------- */
function render() {
  if (!me) { renderAuth(); return; }
  if (!profile) { renderLoading("Loading your profile…"); return; }
  if (curriculum === null) {
    renderLoading(isForeman() ? "Setting up the curriculum…" : "Waiting for your foreman to set up the curriculum…");
    return;
  }
  if (isForeman()) {
    if (view.name === "admin") return renderAdmin();
    if (selectedAppId && selectedAppData) {
      if (view.name === "rank") return renderRankView(selectedAppData, view.rankId, true);
      return renderProgressHome(selectedAppData, true);
    }
    return renderRoster();
  }
  // apprentice
  if (view.name === "rank") return renderRankView(profile, view.rankId, false);
  return renderProgressHome(profile, false);
}

/* ---------- Sign-off (foreman writes to the apprentice doc) ---------- */
function signOff(badgeId) {
  if (!selectedAppId) return;
  const trainer = (document.getElementById("trainerName").value || "").trim();
  const date = document.getElementById("signoffDate").value;
  const notes = (document.getElementById("signoffNotes").value || "").trim();
  if (!trainer) { alert("Trainer / verifier name is required."); return; }
  if (!date) { alert("Date is required."); return; }
  const payload = { trainer: trainer, trainerUid: me.uid, date: date, notes: notes, ts: Date.now() };
  const upd = {}; upd["earnedBadges." + badgeId] = payload;
  db.collection("users").doc(selectedAppId).update(upd)
    .then(() => closeModal())
    .catch(e => alert("Could not sign off: " + e.message));
}
function revokeBadge(badgeId) {
  if (!selectedAppId) return;
  if (!confirm("Power down this merit? The sign-off will be removed.")) return;
  const upd = {}; upd["earnedBadges." + badgeId] = firebase.firestore.FieldValue.delete();
  db.collection("users").doc(selectedAppId).update(upd)
    .then(() => closeModal())
    .catch(e => alert("Could not revoke: " + e.message));
}

function saveBadgeEdits(rankId, badgeId) {

function openAdmin() { view = { name: "admin" }; window.scrollTo(0, 0); render(); }

  // Pull everyone (owner can read all). Use a one-time query.
  C().innerHTML = `
    ${topBar()}

/* ---------- Helpers ---------- */
function computeCurrentRank(earnedMap) {
  for (const rank of curriculum.ranks) {
    const all = rank.badges.length > 0 && rank.badges.every(b => earnedMap[b.id]);
    if (!all) return rank;
  }
  return curriculum.ranks[curriculum.ranks.length - 1] || { name: "—" };
}
function findBadge(badgeId) {
  if (!curriculum) return null;
  for (const r of curriculum.ranks) { const b = r.badges.find(x => x.id === badgeId); if (b) return b; }
  return null;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function escapeAttr(s) { return escapeHtml(s); }
function formatDate(d) {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}

/* ---------- Celebration (apprentice device) ---------- */
function celebrate(badge, trainer) {
  playZap();
  const cel = document.createElement("div");
  cel.className = "celebration";
  cel.innerHTML = `
    <div class="flash"></div>
    <canvas class="spark-canvas"></canvas>
    <div class="cel-rings"><span></span><span></span><span></span></div>
    <div class="cel-longhorn-wrap"><img class="cel-longhorn" src="${LOGO}" alt="Homestead Electric" /></div>
    <canvas class="smoke-canvas"></canvas>
    <div class="cel-text">
      <div class="cel-eyebrow">Merit Unlocked</div>
      <div class="cel-name">${escapeHtml(badge.name)}</div>
      <div class="cel-by">${trainer ? "Signed by " + escapeHtml(trainer) : ""}</div>
    </div>
  `;
  document.body.appendChild(cel);
  runSparks(cel.querySelector(".spark-canvas"));
  // Smoke from the longhorn's nostrils once it has settled into place
  const logo = cel.querySelector(".cel-longhorn");
  const startSmoke = () => {
    const r = logo.getBoundingClientRect();
    if (!r.width) { setTimeout(startSmoke, 80); return; }
    const pts = [
      { x: r.left + r.width * 0.487, y: r.top + r.height * 0.93 },
      { x: r.left + r.width * 0.513, y: r.top + r.height * 0.93 }
    ];
    runSmoke(cel.querySelector(".smoke-canvas"), pts, 3700);
  };
  setTimeout(startSmoke, 600);
  setTimeout(() => cel.remove(), 5000);
}

/* Dev preview: fire the celebration on demand (owner only) */
function testFX() {
  let b = null;
  if (curriculum && curriculum.ranks.length) {
    const r = curriculum.ranks[Math.floor(Math.random() * curriculum.ranks.length)];
    if (r.badges && r.badges.length) b = r.badges[Math.floor(Math.random() * r.badges.length)];
  }
  celebrate(b || { id: "b-markout", name: "Marking Out" }, (profile && profile.name) ? profile.name : "Test");
}

/* Smoke billowing up from the nostrils */
function runSmoke(canvas, points, duration) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const parts = [];
  const t0 = performance.now();
  let spawning = true;
  function spawn() {
    for (const p of points) {
      for (let i = 0; i < 5; i++) {
        parts.push({
          x: p.x + (Math.random() - 0.5) * 9,
          y: p.y,
          vx: (Math.random() - 0.5) * 0.9,
          vy: (1.3 + Math.random() * 1.8),
          life: 1,
          decay: 0.0032 + Math.random() * 0.0036,
          size: 8 + Math.random() * 11,
          grow: 0.5 + Math.random() * 0.55
        });
      }
    }
  }
  function tick(now) {
    if (now - t0 > duration) spawning = false;
    if (spawning && Math.random() < 0.85) spawn();
    ctx.clearRect(0, 0, W, H);
    let alive = false;
    for (const p of parts) {
      if (p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy *= 0.992; p.vx += (Math.random() - 0.5) * 0.09;
      if (p.size < 95) p.size += p.grow;
      p.life -= p.decay;
      const a = Math.max(p.life, 0) * 0.46;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0, "rgba(200,238,248," + a + ")");
      g.addColorStop(0.5, "rgba(150,200,215," + (a * 0.6) + ")");
      g.addColorStop(1, "rgba(120,160,185,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    if (alive || spawning) requestAnimationFrame(tick);
    else ctx.clearRect(0, 0, W, H);
  }
  requestAnimationFrame(tick);
}
function runSparks(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const cx = W / 2, cy = H * 0.41;
  const colors = ["#1ce6ff", "#8ff3ff", "#ffae28", "#ffffff"];
  const parts = [];
  for (let i = 0; i < 90; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 4 + Math.random() * 11;
    parts.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: 0.012 + Math.random() * 0.02, size: 1.5 + Math.random() * 2.5, color: colors[(Math.random() * colors.length) | 0] });
  }
  let frame = 0;
  function tick() {
    frame++;
    ctx.clearRect(0, 0, W, H);
    let alive = false;
    for (const p of parts) {
      if (p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.985; p.vy *= 0.985; p.life -= p.decay;
      ctx.globalAlpha = Math.max(p.life, 0); ctx.fillStyle = p.color;
      ctx.shadowBlur = 12; ctx.shadowColor = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    if (alive && frame < 200) requestAnimationFrame(tick);
  }
  tick();
}
function playZap() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.18);
    osc.frequency.exponentialRampToValueAtTime(420, now + 0.32);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.18, now + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.5);
    const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(1400, now + 0.16);
    osc2.frequency.exponentialRampToValueAtTime(2600, now + 0.4);
    gain2.gain.setValueAtTime(0.0001, now + 0.16);
    gain2.gain.exponentialRampToValueAtTime(0.08, now + 0.2);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
    osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(now + 0.16); osc2.stop(now + 0.55);
    setTimeout(() => ctx.close(), 700);
  } catch (e) {}
}
